name: private-eks-destroy

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type DESTROY to confirm destructive terraform destroy"
        required: true
        default: "NO"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  destroy:
    environment: EKS
    name: Terraform Destroy (manual, destructive)
    runs-on: [self-hosted]
    timeout-minutes: 180

    if: |
      github.event_name == 'workflow_dispatch' &&
      inputs.confirm_destroy == 'DESTROY'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ✅ OIDC Authentication (replaces static credentials)
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify required tools
        shell: bash
        run: |
          set -e
          for cmd in terraform aws jq; do
            if ! command -v $cmd >/dev/null; then
              echo "$cmd not found on runner"
              exit 1
            fi
          done

          terraform -version
          aws --version
          jq --version

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan Destroy (preview)
        run: terraform plan -destroy -out=tf-destroy -input=false

      - name: Terraform Apply Destroy
        run: terraform apply -input=false -auto-approve tf-destroy

      - name: Success message
        run: echo "Terraform destroy completed successfully."